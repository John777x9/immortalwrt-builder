name: Build ImmortalWrt Firmware

on:
  schedule:
    - cron: '0 2 1 * *'           # Monthly auto-build, 1st of month, 02:00 UTC
  workflow_dispatch:               # Manual trigger only
    inputs:
      roles:
        description: 'Roles to build (comma-separated, or "all")'
        required: false
        default: 'all'

env:
  IMMORTALWRT_REPO: https://github.com/immortalwrt/immortalwrt.git

permissions:
  contents: write           # required for release publishing

jobs:
  matrix-prep:
    name: Compute build matrix
    runs-on: ubuntu-22.04
    outputs:
      jobs: ${{ steps.gen.outputs.jobs }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        run: |
          # Each config can pin its branch via filename suffix:
          #   *-2305.config  → openwrt-23.05
          #   else           → openwrt-24.10
          # Output is a JSON array of {role, branch} objects for matrix.
          set -e
          if [[ "${{ inputs.roles }}" == "" || "${{ inputs.roles }}" == "all" ]]; then
              ROLES=$(ls configs/*.config | xargs -n1 basename | sed 's/\.config$//' | sort -u)
          else
              ROLES=$(echo "${{ inputs.roles }}" | tr ',' '\n' | tr -d ' ')
          fi
          JSON='['
          first=1
          for r in $ROLES; do
              case "$r" in
                  *-2305) BR="openwrt-23.05" ;;
                  *)      BR="openwrt-24.10" ;;
              esac
              [ $first -eq 0 ] && JSON="${JSON},"
              JSON="${JSON}{\"role\":\"${r}\",\"branch\":\"${BR}\"}"
              first=0
          done
          JSON="${JSON}]"
          echo "jobs=${JSON}" >> "$GITHUB_OUTPUT"
          echo "Matrix jobs: ${JSON}"

  build:
    needs: matrix-prep
    name: Build ${{ matrix.role }} (${{ matrix.branch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix-prep.outputs.jobs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (~30 GB)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android \
                      /opt/hostedtoolcache 2>/dev/null || true
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          df -h /

      - name: Install build dependencies (official OpenWrt buildroot list)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache ecj fastjar file g++ gawk gettext git \
            java-propose-classpath libelf-dev libncurses-dev libssl-dev \
            python3 python3-distutils python3-setuptools rsync subversion \
            swig time unzip wget xsltproc zlib1g-dev bzip2 flex bison \
            libpython3-dev qemu-utils zstd jq

      - name: Restore ccache (per role + branch)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.role }}-${{ matrix.branch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.role }}-${{ matrix.branch }}-
            ccache-${{ matrix.role }}-

      - name: Clone ImmortalWrt source (${{ matrix.branch }})
        run: |
          git clone --depth 1 -b "${{ matrix.branch }}" "${IMMORTALWRT_REPO}" source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply local patches
        run: |
          if [ -d patches ] && ls patches/*.patch >/dev/null 2>&1; then
            for p in patches/*.patch; do
              echo "Applying $p ..."
              if git -C source apply --check "../$p" 2>/dev/null; then
                git -C source apply "../$p" && echo "  applied"
              else
                echo "  skip (already applied or N/A)"
              fi
            done
          fi

      - name: Apply diffconfig + defconfig
        run: |
          cp configs/${{ matrix.role }}.config source/.config
          cd source && make defconfig

      - name: Layer baked-in /files/ overlay
        run: |
          mkdir -p source/files
          [ -d files/common ] && cp -a files/common/. source/files/
          [ -d "files/${{ matrix.role }}" ] && cp -a "files/${{ matrix.role }}/." source/files/
          chmod +x source/files/etc/uci-defaults/* 2>/dev/null || true

      - name: "Build firmware (make download + make world)"
        timeout-minutes: 300
        working-directory: source
        run: |
          export CCACHE_DIR=~/.ccache
          export PATH=/usr/lib/ccache:$PATH
          make download -j8 V=s 2>&1 | tail -30 || true
          make -j$(nproc) V=s

      - name: Collect artifacts (only this role's target dir)
        run: |
          set -e
          mkdir -p output
          BOARD=$(grep -E '^CONFIG_TARGET_BOARD=' source/.config | cut -d'"' -f2)
          SUB=$(grep -E '^CONFIG_TARGET_SUBTARGET=' source/.config | cut -d'"' -f2)
          ARTDIR="source/bin/targets/${BOARD}/${SUB}"
          echo "art dir: ${ARTDIR}"
          for ext in img.gz vmdk itb bin fip; do
            for f in "${ARTDIR}"/*.${ext}; do
              [ -f "$f" ] && cp -v "$f" output/
            done
          done
          for f in sha256sums profiles.json version.buildinfo; do
            [ -f "${ARTDIR}/$f" ] && cp -v "${ARTDIR}/$f" output/
          done
          for f in "${ARTDIR}"/*.manifest; do
            [ -f "$f" ] && cp -v "$f" output/
          done
          ls -lh output/

      - name: Upload artifacts (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.role }}
          path: output/
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files (per-role prefix on duplicates)
        run: |
          mkdir -p release
          for d in artifacts/firmware-*/; do
            ROLE=$(basename "$d" | sed 's/^firmware-//')
            for f in "$d"*; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              # Same-named-across-roles files get role prefix
              case "$base" in
                sha256sums|profiles.json|version.buildinfo|*.manifest)
                  cp "$f" "release/${ROLE}-${base}"
                  ;;
                *)
                  cp "$f" "release/${base}"
                  ;;
              esac
            done
          done
          (cd release && sha256sum * 2>/dev/null > SHA256SUMS.txt)
          (cd release && find . -maxdepth 1 -type f | sort > FILES.txt)
          ls -lh release/

      - name: Compute release tag
        id: tag
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "tag=build-${DATE}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=ImmortalWrt firmware ($(date -u +%Y-%m-%d))" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ImmortalWrt firmware — automated build.

            Built `${{ github.event.repository.updated_at }}` from `${{ github.sha }}`.

            ## Variants
            - **main-router** (x86_64, ImmortalWrt 24.10) — 商用主路由：PPPoE / WireGuard / NAT / UPnP / sing-box 透明代理
            - **bypass-gateway** (x86_64, ImmortalWrt 24.10) — 商用旁路网关：纯透明代理 + 监控 + 流量统计
            - **mtk-rax3000m-ubootmod-2305** (aarch64, ImmortalWrt 23.05) — CMCC RAX3000M with ubootmod

            ## How to flash
            | Use | File |
            |-----|------|
            | x86 物理机 / U 盘 UEFI | `immortalwrt-x86-64-generic-squashfs-combined-efi.img.gz` |
            | x86 PVE / ESXi UEFI VM | `immortalwrt-x86-64-generic-squashfs-combined-efi.vmdk` |
            | x86 物理机 / VM Legacy | `immortalwrt-x86-64-generic-squashfs-combined.img.gz` |
            | RAX3000M (ubootmod sysupgrade) | `immortalwrt-mediatek-filogic-cmcc_rax3000m-nand-ubootmod-squashfs-sysupgrade.bin` |

            Each role has its own `<role>-sha256sums`. Aggregate `SHA256SUMS.txt` covers everything.
          files: |
            release/*.img.gz
            release/*.vmdk
            release/*.itb
            release/*.bin
            release/*.fip
            release/*-sha256sums
            release/*.manifest
            release/SHA256SUMS.txt
            release/FILES.txt
          draft: false
          prerelease: false
